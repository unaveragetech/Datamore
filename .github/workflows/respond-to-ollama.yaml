name: Generate Dataset from Issue

on:
  issues:
    types: [opened, reopened]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          echo "Waiting for Ollama to be ready…"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✅ Ollama is ready"
              exit 0
            fi
            echo "  attempt $i/30…"
            sleep 3
          done
          echo "❌ Ollama did not become ready in time" >&2
          cat ollama.log >&2
          exit 1

      - name: Generate dataset
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ollama_interactor.py ${{ github.event.issue.number }}

      - name: Commit and push results
        env:
          TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets/ index.html
          git commit -m "dataset: issue #${{ github.event.issue.number }}" || echo "Nothing to commit"
          git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }} HEAD:main

